name: rust-srec Release

on:
  push:
    tags:
      - "rust-srec-v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  CARGO_INCREMENTAL: 0

jobs:
  changes:
    name: Detect Desktop Changes
    runs-on: ubuntu-latest
    outputs:
      desktop_changed: ${{ steps.diff.outputs.desktop_changed }}
      base_tag: ${{ steps.diff.outputs.base_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changes since previous tag
        id: diff
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          CURRENT_TAG="${GITHUB_REF_NAME:-}"
          if [[ -z "$CURRENT_TAG" || "$CURRENT_TAG" == "" ]]; then
            # workflow_dispatch on a branch; compare against latest v* tag.
            CURRENT_TAG=""
          fi

          if [[ -n "${{ inputs.version || '' }}" ]]; then
            # Manual release path. We still diff against the latest v* tag.
            CURRENT_TAG=""
          fi

          BASE_TAG=""
          if [[ -n "$CURRENT_TAG" ]]; then
            BASE_TAG=$(git tag --list 'rust-srec-v*' --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)
          else
            BASE_TAG=$(git tag --list 'rust-srec-v*' --sort=-v:refname | head -n 1 || true)
          fi

          echo "base_tag=$BASE_TAG" >> "$GITHUB_OUTPUT"

          if [[ -z "$BASE_TAG" ]]; then
            # First release (or no tags). Always build desktop.
            echo "desktop_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Diff base: $BASE_TAG"
          CHANGED=$(git diff --name-only "$BASE_TAG...HEAD")

          if echo "$CHANGED" | grep -Eq '^(rust-srec/src-tauri/|rust-srec/frontend/|rust-srec/src/|crates/|Cargo\.(toml|lock)$)'; then
            echo "desktop_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "desktop_changed=false" >> "$GITHUB_OUTPUT"
          fi

  check-and-test:
    name: Check and Test
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: mozilla-actions/sccache-action@v0.0.9
        with:
          version: "v0.13.0"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: taiki-e/install-action@nextest
      - uses: ./.github/actions/setup-protoc
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
      - name: Check
        run: cargo check -p rust-srec --locked --features tls-native-fallback

      - name: Verify release version matches Cargo
        shell: bash
        run: |
          set -euo pipefail

          RAW_INPUT="${{ inputs.version || '' }}"
          if [ -n "$RAW_INPUT" ]; then
            EXPECTED="$RAW_INPUT"
          else
            EXPECTED="${GITHUB_REF_NAME#rust-srec-v}"
          fi

          # cargo metadata always reports the effective package version.
          BACKEND_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "rust-srec") | .version')
          DESKTOP_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "rust-srec-desktop") | .version')

          if [ "$BACKEND_VERSION" != "$EXPECTED" ]; then
            echo "rust-srec Cargo version mismatch: expected $EXPECTED, got $BACKEND_VERSION" >&2
            exit 1
          fi

          if [ "$DESKTOP_VERSION" != "$EXPECTED" ]; then
            echo "rust-srec-desktop Cargo version mismatch: expected $EXPECTED, got $DESKTOP_VERSION" >&2
            exit 1
          fi
      - name: Clippy
        run: cargo clippy -p rust-srec --locked --features tls-native-fallback -- -D warnings
      - name: Test
        run: cargo nextest run -p rust-srec --locked --features tls-native-fallback
      - name: Doctests
        run: cargo test -p rust-srec --locked --doc --features tls-native-fallback
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  build:
    needs: check-and-test
    uses: ./.github/workflows/build-binaries.yml
    with:
      packages: '-p rust-srec --bins'
      binaries: '["rust-srec", "rust-srec-vapid"]'
      need_protoc: true

  desktop:
    name: Desktop
    needs: [check-and-test, changes]
    if: needs.changes.outputs.desktop_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            args: ''
          - os: macos-15-intel
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - os: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust-srec/src-tauri
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.args, '--target') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: ./.github/actions/setup-protoc

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Install dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Limit bundles (Linux ARM64)
        if: runner.os == 'Linux' && runner.arch == 'ARM64'
        shell: bash
        run: |
          set -euo pipefail

          jq '.bundle.targets = ["deb"]' tauri.conf.json > tauri.conf.json.tmp
          mv tauri.conf.json.tmp tauri.conf.json

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: rust-srec/frontend/pnpm-lock.yaml

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Install frontend dependencies
        run: pnpm -C ../frontend install --frozen-lockfile

      - name: Build desktop bundles
        env:
          VITE_UI_BUILD: ${{ github.ref_name }}@${{ github.sha }}
        run: cargo tauri build --ci ${{ matrix.args }}

      - name: Collect desktop artifacts (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$GITHUB_WORKSPACE/release-assets"

          find "$GITHUB_WORKSPACE/target" \
            -type f \
            -path '*/release/bundle/*' \
            \( \
              -name '*.dmg' -o \
              -name '*.msi' -o \
              -name '*-setup.exe' -o \
              -name '*.deb' -o \
              -name '*.rpm' -o \
              -name '*.AppImage' \
            \) \
            -print \
            -exec cp -v '{}' "$GITHUB_WORKSPACE/release-assets/" ';'

          test -n "$(ls -A "$GITHUB_WORKSPACE/release-assets")"

      - name: Collect desktop artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $root = $env:GITHUB_WORKSPACE
          $outDir = Join-Path $root 'release-assets'
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $candidateReleaseDirs = @(
            (Join-Path $root 'target/release'),
            (Join-Path $root 'rust-srec/src-tauri/target/release')
          )

          $exe = $null
          foreach ($dir in $candidateReleaseDirs) {
            $candidate = Join-Path $dir 'rust-srec.exe'
            if (Test-Path $candidate) {
              $exe = $candidate
              break
            }
          }
          if (-not $exe) {
            foreach ($dir in $candidateReleaseDirs) {
              if (-not (Test-Path $dir)) { continue }
              $exe = Get-ChildItem $dir -Filter '*.exe' -File |
                Where-Object { $_.Name -notlike '*setup*' } |
                Select-Object -First 1 -ExpandProperty FullName
              if ($exe) { break }
            }
          }
          if (-not $exe) {
            throw "No desktop .exe found under known target dirs"
          }

          $staging = Join-Path $root 'portable/rust-srec'
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item $exe -Destination $staging -Force

          foreach ($dir in $candidateReleaseDirs) {
            $candidate = Join-Path $dir 'resources'
            if (Test-Path $candidate) {
              Copy-Item $candidate -Destination $staging -Recurse -Force
              break
            }
          }

          $zipName = "rust-srec-desktop-portable-${{ matrix.target }}.zip"
          $zipPath = Join-Path $outDir $zipName
          Compress-Archive -Path (Join-Path $root 'portable/*') -DestinationPath $zipPath -Force

          Get-ChildItem (Join-Path $root 'target') -Recurse -File |
            Where-Object {
              $_.FullName -match '\\release\\bundle\\' -and (
                $_.Name -like '*.msi' -or
                $_.Name -like '*-setup.exe' -or
                $_.Name -like '*.dmg' -or
                $_.Name -like '*.deb' -or
                $_.Name -like '*.rpm' -or
                $_.Name -like '*.AppImage'
              )
            } |
            ForEach-Object { Copy-Item $_.FullName -Destination $outDir -Force }

          if (-not (Get-ChildItem $outDir -File | Select-Object -First 1)) {
            throw "No desktop artifacts collected in $outDir"
          }

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rust-srec-desktop-${{ inputs.version && format('v{0}', inputs.version) || github.ref_name }}-${{ runner.os }}-${{ runner.arch }}
          path: release-assets/*
          if-no-files-found: error

  docker-build:
    name: Build Docker
    needs: check-and-test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push backend
        id: build-backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: rust-srec/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/rust-srec,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}-backend
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}-backend
      
      - name: Export digest backend
        run: |
          mkdir -p /tmp/digests/backend
          digest="${{ steps.build-backend.outputs.digest }}"
          touch "/tmp/digests/backend/${digest#sha256:}"

      - name: Build and push vapid
        id: build-vapid
        uses: docker/build-push-action@v6
        with:
          context: .
          file: rust-srec/Dockerfile.vapid
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/rust-srec-vapid,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}-vapid
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}-vapid

      - name: Export digest vapid
        run: |
          mkdir -p /tmp/digests/vapid
          digest="${{ steps.build-vapid.outputs.digest }}"
          touch "/tmp/digests/vapid/${digest#sha256:}"
      
      - name: Build and push frontend
        id: build-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./rust-srec/frontend
          file: rust-srec/frontend/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            VITE_UI_BUILD=${{ github.ref_name }}@${{ github.sha }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/rust-srec-frontend,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}-frontend
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}-frontend

      - name: Export digest frontend
        run: |
          mkdir -p /tmp/digests/frontend
          digest="${{ steps.build-frontend.outputs.digest }}"
          touch "/tmp/digests/frontend/${digest#sha256:}"

      - name: Upload digests
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    name: Merge Docker
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION_INPUT="${{ inputs.version }}"
          if [ -n "$VERSION_INPUT" ]; then
            RAW="$VERSION_INPUT"
          else
            RAW="${GITHUB_REF_NAME}"
          fi

          # Git tags are prefixed as rust-srec-vX.Y.Z; docker tags stay at vX.Y.Z.
          case "$RAW" in
            rust-srec-v*) VERSION_TAG="${RAW#rust-srec-}" ;;
            v*) VERSION_TAG="$RAW" ;;
            *) VERSION_TAG="v$RAW" ;;
          esac

          echo "version=$VERSION_TAG" >> "$GITHUB_OUTPUT"

      - name: Create manifest list and push backend
        working-directory: /tmp/digests/backend
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/rust-srec:${{ steps.version.outputs.version }} \
            -t ghcr.io/${{ github.repository_owner }}/rust-srec:latest \
            $(printf 'ghcr.io/${{ github.repository_owner }}/rust-srec@sha256:%s ' *)

      - name: Create manifest list and push vapid
        working-directory: /tmp/digests/vapid
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/rust-srec-vapid:${{ steps.version.outputs.version }} \
            -t ghcr.io/${{ github.repository_owner }}/rust-srec-vapid:latest \
            $(printf 'ghcr.io/${{ github.repository_owner }}/rust-srec-vapid@sha256:%s ' *)
      
      - name: Create manifest list and push frontend
        working-directory: /tmp/digests/frontend
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/rust-srec-frontend:${{ steps.version.outputs.version }} \
            -t ghcr.io/${{ github.repository_owner }}/rust-srec-frontend:latest \
            $(printf 'ghcr.io/${{ github.repository_owner }}/rust-srec-frontend@sha256:%s ' *)

  release:
    name: Release
    needs: [build, desktop, docker-merge]
    if: |
      always() &&
      needs.build.result == 'success' &&
      needs.docker-merge.result == 'success' &&
      (needs.desktop.result == 'success' || needs.desktop.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: binaries-*
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: rust-srec-desktop-*
          merge-multiple: true
      - name: Prepare publish assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p publish

          normalize_asset_name() {
            local base="$1"

            # CLI binaries with target triples pass through unchanged.
            if [[ "$base" =~ ^(rust-srec|rust-srec-vapid)-(x86_64|aarch64)-(unknown-linux|apple-darwin|pc-windows) ]]; then
              printf '%s' "$base"
              return 0
            fi

            # Portable zip (already named with target triple).
            if [[ "$base" =~ ^rust-srec-desktop-portable-(x86_64|aarch64)-.+\.zip$ ]]; then
              printf '%s' "$base"
              return 0
            fi

            # Linux .deb
            if [[ "$base" =~ ^rust-srec_[0-9]+\.[0-9]+\.[0-9]+_(amd64|arm64|aarch64)\.deb$ ]]; then
              local arch="${BASH_REMATCH[1]}"
              local target=""
              case "$arch" in
                amd64) target="x86_64-unknown-linux-gnu" ;;
                arm64|aarch64) target="aarch64-unknown-linux-gnu" ;;
              esac
              printf 'rust-srec-desktop-%s.deb' "$target"
              return 0
            fi

            # Linux .AppImage
            if [[ "$base" =~ ^rust-srec_[0-9]+\.[0-9]+\.[0-9]+_(amd64|arm64|aarch64)\.AppImage$ ]]; then
              local arch="${BASH_REMATCH[1]}"
              local target=""
              case "$arch" in
                amd64) target="x86_64-unknown-linux-gnu" ;;
                arm64|aarch64) target="aarch64-unknown-linux-gnu" ;;
              esac
              printf 'rust-srec-desktop-%s.AppImage' "$target"
              return 0
            fi

            # Linux .rpm
            if [[ "$base" =~ ^rust-srec-[0-9]+\.[0-9]+\.[0-9]+-[0-9]+\.(x86_64|aarch64)\.rpm$ ]]; then
              local arch="${BASH_REMATCH[1]}"
              local target=""
              case "$arch" in
                x86_64) target="x86_64-unknown-linux-gnu" ;;
                aarch64) target="aarch64-unknown-linux-gnu" ;;
              esac
              printf 'rust-srec-desktop-%s.rpm' "$target"
              return 0
            fi

            # macOS .dmg
            if [[ "$base" =~ ^rust-srec_[0-9]+\.[0-9]+\.[0-9]+_(x64|aarch64|amd64|arm64)\.dmg$ ]]; then
              local arch="${BASH_REMATCH[1]}"
              local target=""
              case "$arch" in
                x64|amd64) target="x86_64-apple-darwin" ;;
                aarch64|arm64) target="aarch64-apple-darwin" ;;
              esac
              printf 'rust-srec-desktop-%s.dmg' "$target"
              return 0
            fi

            # Windows .msi
            if [[ "$base" =~ ^rust-srec_[0-9]+\.[0-9]+\.[0-9]+_(x64|amd64)(_.+)?\.msi$ ]]; then
              printf 'rust-srec-desktop-x86_64-pc-windows-msvc.msi'
              return 0
            fi

            # Windows setup .exe
            if [[ "$base" =~ ^rust-srec_[0-9]+\.[0-9]+\.[0-9]+_(x64|amd64)-setup\.exe$ ]]; then
              printf 'rust-srec-desktop-x86_64-pc-windows-msvc-setup.exe'
              return 0
            fi

            printf '%s' "$base"
          }

          while IFS= read -r -d '' file; do
            base="$(basename "$file")"
            case "$base" in
              rust-srec-*|*.exe|*.dmg|*.msi|*.deb|*.rpm|*.AppImage|*.zip) ;;
              *) continue ;;
            esac
            out="$(normalize_asset_name "$base")"
            cp -v "$file" "publish/$out"
          done < <(find artifacts -maxdepth 2 -type f -print0)

          test -n "$(ls -A publish)"
      - name: Prune stale release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if ! command -v gh >/dev/null 2>&1; then
            echo "gh not found; skipping asset pruning"
            exit 0
          fi

          if ! release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" 2>/dev/null)"; then
            echo "No existing release for tag ${GITHUB_REF_NAME}; skipping asset pruning"
            exit 0
          fi

          mapfile -t keep < <(ls -1 publish)
          if [ "${#keep[@]}" -eq 0 ]; then
            echo "publish/ is empty; refusing to prune"
            exit 1
          fi

          echo "$release_json" | jq -r '.assets[]? | [.id, .name] | @tsv' | while IFS=$'\t' read -r id name; do
            if printf '%s\n' "${keep[@]}" | grep -Fqx -- "$name"; then
              continue
            fi
            echo "Deleting stale asset: $name"
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${id}" >/dev/null
          done
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/*
          generate_release_notes: true
